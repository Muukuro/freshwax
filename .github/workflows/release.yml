name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  version:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      is_semver: ${{ steps.version.outputs.is_semver }}
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Parse tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ "${tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "is_semver=true" >> "${GITHUB_OUTPUT}"
            echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}" >> "${GITHUB_OUTPUT}"
            echo "major=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
            echo "minor=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
            echo "patch=${BASH_REMATCH[3]}" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::${tag} is not a Freshwax release tag. Expected vMAJOR.MINOR.PATCH."
            echo "is_semver=false" >> "${GITHUB_OUTPUT}"
          fi

  checks:
    name: Lint, Prisma, and build
    needs: version
    if: needs.version.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: freshwax
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d freshwax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      APP_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freshwax?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify populated database upgrade
        run: npm run test:schema-upgrade

      - name: Verify clean database migration
        run: npm run test:schema-upgrade -- --empty

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  publish:
    name: Publish image and GitHub release
    needs:
      - version
      - checks
    if: needs.version.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          image_name="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          version="${{ needs.version.outputs.version }}"
          major="${{ needs.version.outputs.major }}"
          minor="${{ needs.version.outputs.minor }}"

          {
            echo "name=${image_name}"
            echo "tags<<EOF"
            echo "${image_name}:${version}"
            echo "${image_name}:${major}.${minor}"
            echo "${image_name}:${major}"
            echo "${image_name}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Freshwax
            org.opencontainers.image.description=Self-hosted music release tracker
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Report compressed image size
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        shell: bash
        run: |
          index_file="$(mktemp)"
          manifest_file="$(mktemp)"
          docker buildx imagetools inspect \
            "${IMAGE_NAME}@${IMAGE_DIGEST}" \
            --raw > "${index_file}"

          if jq -e '.layers' "${index_file}" >/dev/null; then
            cp "${index_file}" "${manifest_file}"
          else
            platform_digest="$(
              jq -r '
                first(
                  .manifests[]
                  | select(.platform.os != "unknown")
                  | .digest
                )
              ' "${index_file}"
            )"
            test -n "${platform_digest}"
            docker buildx imagetools inspect \
              "${IMAGE_NAME}@${platform_digest}" \
              --raw > "${manifest_file}"
          fi

          {
            echo "## Container image size"
            echo
            echo "| Layer | Compressed size |"
            echo "| --- | ---: |"
            jq -r '.layers[] | [.digest[7:19], .size] | @tsv' "${manifest_file}" |
              while IFS=$'\t' read -r digest size; do
                printf '| `%s` | %.2f MB |\n' "${digest}" "$(awk -v bytes="${size}" 'BEGIN { print bytes / 1000 / 1000 }')"
              done
            total_bytes="$(jq '[.layers[].size] | add' "${manifest_file}")"
            printf '| **Total** | **%.2f MB** |\n' "$(awk -v bytes="${total_bytes}" 'BEGIN { print bytes / 1000 / 1000 }')"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          notes_file="$(mktemp)"
          generated_notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -q .body)"

          {
            echo "${generated_notes}"
            echo
            echo "## Container image"
            echo
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${VERSION}"
            echo '```'
          } > "${notes_file}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "Freshwax ${VERSION}" \
              --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" \
              --title "Freshwax ${VERSION}" \
              --notes-file "${notes_file}"
          fi
