name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  APP_URL: http://127.0.0.1:3000
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freshwax?schema=public
  NEXT_TELEMETRY_DISABLED: "1"
  REDIS_URL: redis://localhost:6379

jobs:
  version:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      is_semver: ${{ steps.version.outputs.is_semver }}
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      patch: ${{ steps.version.outputs.patch }}
    steps:
      - name: Parse tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ "${tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "is_semver=true" >> "${GITHUB_OUTPUT}"
            echo "version=${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}" >> "${GITHUB_OUTPUT}"
            echo "major=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
            echo "minor=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
            echo "patch=${BASH_REMATCH[3]}" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::${tag} is not a Freshwax release tag. Expected vMAJOR.MINOR.PATCH."
            echo "is_semver=false" >> "${GITHUB_OUTPUT}"
          fi

  checks:
    name: Lint, Prisma, and build
    needs: version
    if: needs.version.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  publish:
    name: Publish image and GitHub release
    needs:
      - version
      - checks
    if: needs.version.outputs.is_semver == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        shell: bash
        run: |
          image_name="$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          version="${{ needs.version.outputs.version }}"
          major="${{ needs.version.outputs.major }}"
          minor="${{ needs.version.outputs.minor }}"

          {
            echo "name=${image_name}"
            echo "tags<<EOF"
            echo "${image_name}:${version}"
            echo "${image_name}:${major}.${minor}"
            echo "${image_name}:${major}"
            echo "${image_name}:latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Freshwax
            org.opencontainers.image.description=Self-hosted music release tracker
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          VERSION: ${{ needs.version.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          notes_file="$(mktemp)"
          generated_notes="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${TAG_NAME}" \
            -q .body)"

          {
            echo "${generated_notes}"
            echo
            echo "## Container image"
            echo
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${VERSION}"
            echo '```'
          } > "${notes_file}"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "Freshwax ${VERSION}" \
              --notes-file "${notes_file}"
          else
            gh release create "${TAG_NAME}" \
              --title "Freshwax ${VERSION}" \
              --notes-file "${notes_file}"
          fi
