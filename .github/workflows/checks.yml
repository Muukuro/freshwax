name: Checks

on:
  push:

permissions:
  contents: read

env:
  APP_URL: http://127.0.0.1:3000
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/freshwax?schema=public
  NEXT_TELEMETRY_DISABLED: "1"
  REDIS_URL: redis://localhost:6379

jobs:
  checks:
    name: Lint, Prisma, and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: freshwax
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d freshwax"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify affected v0.0.4 database upgrade
        run: npm run test:schema-upgrade -- v0.0.4

      - name: Verify previous-release database upgrade
        run: npm run test:schema-upgrade

      - name: Verify clean database migration
        run: npm run test:schema-upgrade -- --empty

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
