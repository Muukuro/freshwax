services:
  db-init:
    build: .
    command: npx prisma db push
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    command: node .next/standalone/server.js
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  worker:
    build: .
    command: npx tsx src/worker.ts
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: new_release_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d new_release_tracker"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
