services:
  db-init:
    image: ${FRESHWAX_IMAGE:-ghcr.io/muukuro/freshwax:latest}
    command: npx prisma db push
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ${FRESHWAX_IMAGE:-ghcr.io/muukuro/freshwax:latest}
    command: node .next/standalone/server.js
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    image: ${FRESHWAX_IMAGE:-ghcr.io/muukuro/freshwax:latest}
    command: npx tsx src/worker.ts
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: freshwax
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freshwax"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  redis-data:
