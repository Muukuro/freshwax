<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#08111b" />
    <title>Freshwax offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background:
          radial-gradient(circle at top left, rgba(122, 176, 255, 0.22), transparent 28%),
          linear-gradient(180deg, #09131d 0%, #08111b 100%);
        color: #eef4fb;
        display: flex;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      main {
        background: rgba(12, 22, 34, 0.82);
        border: 1px solid rgba(157, 185, 214, 0.16);
        border-radius: 24px;
        box-shadow: 0 28px 62px rgba(0, 0, 0, 0.34);
        margin: 0 auto;
        max-width: 520px;
        padding: 28px;
      }

      p:first-child {
        color: #c8ff54;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        margin: 0 0 16px;
        text-transform: uppercase;
      }

      h1 {
        font-size: 32px;
        line-height: 1.05;
        margin: 0;
      }

      p {
        color: #98abc0;
        line-height: 1.7;
      }

      button {
        background: #c8ff54;
        border: 1px solid rgba(15, 28, 43, 0.18);
        border-radius: 999px;
        color: #0f1600;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Freshwax</p>
      <h1>You are offline</h1>
      <p>
        Freshwax can reopen pages and artwork that were cached on this device, but live release
        data needs a network connection.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
